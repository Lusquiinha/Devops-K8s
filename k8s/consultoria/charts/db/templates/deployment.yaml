apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app: {{ .Release.Name }}-db
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-db
    spec:
      containers:
        - name: {{ .Release.Name }}-db
          image: "{{ .Values.global.postgres.image }}"
          imagePullPolicy: {{ .Values.global.postgres.pullPolicy }}
          ports:
            - containerPort: {{ .Values.global.postgres.port }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: POSTGRES_DB
            - name: PGDATA
              value: {{ .Values.pgData }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.global.postgres.user }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: {{ .Release.Name }}-db-storage
              mountPath: {{ .Values.mountPath }}
      volumes:
        - name: {{ .Release.Name }}-db-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-db-pvc
