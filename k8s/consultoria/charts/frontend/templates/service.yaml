apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.frontend.name }}
  labels:
    app: {{ .Values.global.frontend.name }}
spec:
  ports:
    - port: {{ .Values.global.frontend.port }}
      targetPort: {{ .Values.global.frontend.port }}
      protocol: TCP
  selector:
    app: {{ .Values.global.frontend.name }}
